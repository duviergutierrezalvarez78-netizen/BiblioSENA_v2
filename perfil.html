<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioSENA — Mi Perfil</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar__header"><svg class="sidebar__logo" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="sidebar__title">BiblioSENA</span></div>
            <nav class="sidebar__nav"><ul class="nav__list">
                <li><a href="dashboard.html" class="nav__link">Dashboard</a></li>
                <li><a href="libros.html" class="nav__link">Libros</a></li>
                <li><a href="prestamos.html" class="nav__link">Préstamos</a></li>
                <li><a href="reportes.html" class="nav__link">Reportes</a></li>
                <li><a href="perfil.html" class="nav__link nav__link--active">Mi Perfil</a></li>
            </ul></nav>
        </aside>
        <main class="main-content">
            <header class="app-header"><h2 class="header__title">Mi Perfil</h2><div class="user-menu"><div class="user-avatar">HG</div><button class="btn--logout" onclick="window.location.href='login.html'">Cerrar Sesión</button></div></header>
            <div class="page-content">
                <div class="profile-header">
                    <div class="profile-photo">HG</div>
                    <div class="profile-info">
                        <h2 class="profile-name">Henry Duvier Gutiérrez Álvarez</h2>
                        <p class="user-role">Administrador del Sistema</p>
                        <p style="margin-top:8px;color:var(--text-muted)">ID: 1002456789 | henry.gutierrez@sena.edu.co</p>
                    </div>
                </div>
                <section class="section">
                    <h3 class="section__title">Datos Personales</h3>
                    <form>
                        <div class="form-group"><label>Nombre Completo</label><input type="text" value="Henry Duvier Gutiérrez Álvarez"></div>
                        <div class="form-group"><label>Correo</label><input type="email" value="henry.gutierrez@sena.edu.co"></div>
                        <div class="form-row">
                            <div class="form-group"><label>Identificación</label><input type="text" value="1002456789" readonly></div>
                            <div class="form-group"><label>Rol</label><input type="text" value="Administrador" readonly></div>
                        </div>
                        <button type="submit" class="btn">Guardar Cambios</button>
                    </form>
                </section>
                <section class="section">
                    <h3 class="section__title">Cambiar Contraseña</h3>
                    <form style="max-width:400px">
                        <div class="form-group"><label>Contraseña Actual</label><input type="password"></div>
                        <div class="form-group"><label>Nueva Contraseña</label><input type="password"></div>
                        <div class="form-group"><label>Confirmar</label><input type="password"></div>
                        <button type="submit" class="btn">Actualizar</button>
                    </form>
                </section>
            </div>
            <footer class="main-footer">BiblioSENA v1.0.0 — SENA</footer>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
